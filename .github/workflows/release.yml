name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Pack and publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Build code generator
        run: dotnet build src/cdp.generator/Selenium.WebDriver.BiDi.Cdp.Generator.csproj --configuration Release

      - name: Pack
        run: dotnet pack src/cdp/Selenium.WebDriver.BiDi.Cdp.csproj --configuration Release --output artifacts

      - name: Publish to NuGet.org
        run: >-
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*.nupkg
